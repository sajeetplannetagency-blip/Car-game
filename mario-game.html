<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Super Mario Bros 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;}
body{display:flex;align-items:center;justify-content:center;}
#wrap{
  position:relative;
  width:min(100vw, 177.78vh);
  aspect-ratio:16/9;
  background:#000;
}
canvas{
  display:block;width:100%;height:100%;
  image-rendering:pixelated;image-rendering:crisp-edges;
}
/* ── TOUCH CONTROLS ── */
#ctrls{
  position:absolute;inset:0;
  pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:0 3.5% 2.5%;
}
.cside{display:flex;gap:2%;pointer-events:auto;align-items:flex-end;}
.gbtn{
  width:clamp(44px,11vmin,72px);
  height:clamp(44px,11vmin,72px);
  border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.32);
  background:rgba(0,0,0,0.28);
  color:#fff;
  font-family:monospace;font-weight:bold;
  font-size:clamp(13px,3vmin,22px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  touch-action:none;transition:background 0.07s,transform 0.07s;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.gbtn.on{background:rgba(255,255,255,0.38);transform:scale(0.88);}
#bjump{
  background:rgba(20,190,80,0.28);border-color:rgba(60,255,130,0.5);
  width:clamp(52px,13vmin,82px);height:clamp(52px,13vmin,82px);
  font-size:clamp(11px,2.8vmin,18px);
}
#brun{background:rgba(230,100,0,0.28);border-color:rgba(255,170,0,0.5);}
#bstart,#bpause{
  position:absolute;top:1.5%;
  padding:4px 10px;border-radius:12px;font-size:clamp(9px,2vmin,13px);
  border:1.5px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.4);
  color:#ccc;pointer-events:auto;cursor:pointer;user-select:none;
}
#bstart{right:2%;}
#bpause{right:calc(2% + 52px);font-size:clamp(11px,2.5vmin,16px);padding:3px 9px;}
/* D-pad: ◀ ▼ ▶ in a row */
.dpad{display:flex;flex-direction:row;gap:1.5%;align-items:center;}
#bdown{background:rgba(80,80,200,0.28);border-color:rgba(140,140,255,0.5);}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- Touch controls -->
  <div id="ctrls">
    <!-- Left side: ◀ ▼ ▶ -->
    <div class="cside dpad">
      <button class="gbtn" id="bleft">◀</button>
      <button class="gbtn" id="bdown">▼</button>
      <button class="gbtn" id="bright">▶</button>
    </div>
    <!-- Right side: RUN + JUMP -->
    <div class="cside">
      <button class="gbtn" id="brun">RUN</button>
      <button class="gbtn" id="bjump">JUMP</button>
    </div>
  </div>
  <!-- Start / Enter button -->
  <button id="bstart">START</button>
  <button id="bpause">⏸</button>
</div>

<script>
// ============================================================
//   SUPER MARIO BROS 2.0  — 16:9 Mobile Edition
// ============================================================
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const T=32;
const CW=640;   // 16:9  640×360
const CH=360;
canvas.width=CW;canvas.height=CH;

// ── PHYSICS ─────────────────────────────────────────────────
const GRAV=0.55,MAX_FALL=13,JWALK=-11,JRUN=-13,MWALK=3.0,MRUN=5.5;

// ── TILE IDs ────────────────────────────────────────────────
const E=0,GR=1,BR=2,QU=3,US=4,SO=5,PTL=6,PTR=7,PBL=8,PBR=9,CO=10,FL=11;
const SOLID=[GR,BR,QU,US,SO,PTL,PTR,PBL,PBR];
const BLOCK=[BR,QU];
function isSolid(t){return SOLID.includes(t);}
function isBlock(t){return BLOCK.includes(t);}

// ── AUDIO ───────────────────────────────────────────────────
let AC=null;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,type,dur,vol=0.25,delay=0){
  if(!AC)return;
  const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=type;
  o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function noise(dur,vol=0.4){
  if(!AC)return;const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=AC.createBufferSource(),g=AC.createGain();
  s.buffer=b;s.connect(g);g.connect(AC.destination);
  const t=AC.currentTime;g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);s.start(t);
}
const SFX={
  jump:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(700,t+0.12);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);o.start(t);o.stop(t+0.18);},
  coin:()=>{tone(1047,'square',0.06,0.35);tone(1319,'square',0.15,0.35,0.07);},
  stomp:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(450,t);o.frequency.exponentialRampToValueAtTime(80,t+0.12);g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);o.start(t);o.stop(t+0.15);},
  bump:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(100,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);o.start(t);o.stop(t+0.12);},
  brk:()=>{noise(0.1,0.5);tone(200,'sawtooth',0.08,0.3);},
  powerup:()=>{[659,784,988,1319].forEach((f,i)=>tone(f,'square',0.1,0.3,i*0.1));},
  die:()=>{tone(494,'square',0.15,0.4,0);tone(440,'square',0.15,0.4,0.15);tone(369,'square',0.15,0.4,0.3);tone(261,'square',0.5,0.4,0.45);},
  flag:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,'square',0.12,0.3,i*0.12));},
  oneup:()=>{[523,659,784,1047,1319].forEach((f,i)=>tone(f,'square',0.1,0.3,i*0.08));},
};

// ── MUSIC ───────────────────────────────────────────────────
// Happy Fantasy Adventure Theme – bright, energetic chip-tune
// Format: [frequency_hz, beats]  BPM=175
const FANTASY_BPM=175, Fb=60/FANTASY_BPM;

const FANTASY_THEME=[
  // ---- Section A : bright rising fanfare ----
  [783.99,.5],[880,.5],[987.77,.5],[1046.5,.5],
  [987.77,.5],[880,.5],[783.99,.5],[659.25,.5],
  [659.25,.5],[739.99,.5],[783.99,.5],[880,.5],
  [880,1.5],[0,.5],
  // ---- Section A2 ----
  [523.25,.5],[587.33,.5],[659.25,.5],[783.99,.5],
  [880,.5],[783.99,.5],[659.25,.5],[587.33,.5],
  [523.25,.5],[659.25,.5],[783.99,.5],[1046.5,.5],
  [783.99,2],
  // ---- Section B : playful bridge ----
  [440,.5],[493.88,.5],[523.25,.5],[587.33,.5],
  [659.25,.5],[587.33,.5],[523.25,.5],[493.88,.5],
  [440,.5],[523.25,.5],[659.25,.5],[783.99,.5],
  [659.25,1.5],[0,.5],
  // ---- Section B2 ----
  [392,.5],[440,.5],[493.88,.5],[523.25,.5],
  [587.33,.5],[659.25,.5],[783.99,.5],[880,.5],
  [783.99,.5],[659.25,.5],[523.25,.5],[392,.5],
  [523.25,2],
  // ---- Section C : energetic climax ----
  [987.77,.5],[880,.5],[783.99,.5],[659.25,.5],
  [783.99,.5],[880,.5],[987.77,.5],[1046.5,.5],
  [1174.66,.5],[1046.5,.5],[987.77,.5],[880,.5],
  [783.99,1],[0,.5],[783.99,.5],
  // ---- Section C2 ----
  [880,.5],[987.77,.5],[1046.5,.5],[880,.5],
  [783.99,.5],[659.25,.5],[523.25,.5],[659.25,.5],
  [783.99,.5],[659.25,.5],[523.25,.5],[392,.5],
  [523.25,2],
  // ---- Ending fanfare ----
  [523.25,.5],[659.25,.5],[783.99,.5],[1046.5,.5],
  [987.77,.5],[880,.5],[783.99,.5],[659.25,.5],
  [523.25,1],[659.25,.5],[523.25,.5],[392,1],
];

// Underground – dark, bouncy
const UG_THEME=[
  [261.63,.5],[329.63,.5],[392,.5],[440,.5],
  [392,.5],[329.63,.5],[261.63,.5],[0,.5],
  [261.63,.5],[349.23,.5],[440,.5],[523.25,.5],
  [440,.5],[349.23,.5],[261.63,.5],[0,.5],
  [293.66,.5],[369.99,.5],[440,.5],[493.88,.5],
  [440,.5],[369.99,.5],[293.66,.5],[0,.5],
  [261.63,.5],[329.63,.5],[392,.5],[523.25,.5],
  [392,.5],[329.63,.5],[261.63,1],[0,1],
];

// ── Lookahead Scheduler (no stutter!) ────────────────────────
let musicPlaying=false,musicNoteIdx=0,musicNextTime=0;
let musicTheme=FANTASY_THEME,musicSchedTO=null;
const LOOKAHEAD=0.25, SCHED_MS=80;

function _scheduleNotes(){
  if(!AC||!musicPlaying)return;
  while(musicNextTime<AC.currentTime+LOOKAHEAD){
    const[f,b]=musicTheme[musicNoteIdx%musicTheme.length];
    const dur=b*Fb;
    if(f>0){
      // Melody
      const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g);g.connect(AC.destination);
      o.type='square';o.frequency.setValueAtTime(f,musicNextTime);
      g.gain.setValueAtTime(0.1,musicNextTime);
      g.gain.exponentialRampToValueAtTime(0.0001,musicNextTime+dur*0.78);
      o.start(musicNextTime);o.stop(musicNextTime+dur);
      // Harmony (fifth below) every 4 notes
      if(musicNoteIdx%4===0){
        const oh=AC.createOscillator(),gh=AC.createGain();
        oh.connect(gh);gh.connect(AC.destination);
        oh.type='triangle';oh.frequency.setValueAtTime(f*0.667,musicNextTime);
        gh.gain.setValueAtTime(0.06,musicNextTime);
        gh.gain.exponentialRampToValueAtTime(0.0001,musicNextTime+dur*0.6);
        oh.start(musicNextTime);oh.stop(musicNextTime+dur);
      }
      // Bass every 8 notes
      if(musicNoteIdx%8===0){
        const ob=AC.createOscillator(),gb=AC.createGain();
        ob.connect(gb);gb.connect(AC.destination);
        ob.type='square';ob.frequency.setValueAtTime(f/4,musicNextTime);
        gb.gain.setValueAtTime(0.05,musicNextTime);
        gb.gain.exponentialRampToValueAtTime(0.0001,musicNextTime+dur*0.5);
        ob.start(musicNextTime);ob.stop(musicNextTime+dur);
      }
    }
    musicNextTime+=dur;
    musicNoteIdx++;
  }
  musicSchedTO=setTimeout(_scheduleNotes,SCHED_MS);
}
function startMusic(theme){
  if(musicPlaying||!AC)return;
  musicPlaying=true;musicNoteIdx=0;
  musicTheme=theme||FANTASY_THEME;
  musicNextTime=AC.currentTime+0.08;
  _scheduleNotes();
}
function stopMusic(){
  musicPlaying=false;
  if(musicSchedTO)clearTimeout(musicSchedTO);
  musicSchedTO=null;
}
function playLevelMusic(){
  stopMusic();
  if(curLevel&&curLevel.underground)startMusic(UG_THEME);
  else startMusic(FANTASY_THEME);
}

// ── INPUT ───────────────────────────────────────────────────
const keys={},just={};
window.addEventListener('keydown',e=>{
  if(!keys[e.code])just[e.code]=true;
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  initAC();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── TOUCH BINDINGS ──────────────────────────────────────────
// jumpQueue: each tap adds 1, consumed when Mario lands and jumps
let jumpQueue=0;
let jumpHoldTouch=false; // true while finger holds jump button

function bindBtn(id,code,altCode){
  const el=document.getElementById(id);
  function dn(e){
    e.preventDefault();
    keys[code]=true;just[code]=true;
    if(altCode){keys[altCode]=true;just[altCode]=true;}
    el.classList.add('on');initAC();
  }
  function up(e){
    e.preventDefault();
    keys[code]=false;
    if(altCode)keys[altCode]=false;
    el.classList.remove('on');
  }
  el.addEventListener('touchstart',dn,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('touchcancel',up,{passive:false});
  el.addEventListener('mousedown',dn);
  el.addEventListener('mouseup',up);
  el.addEventListener('mouseleave',up);
}
bindBtn('bleft','ArrowLeft');
bindBtn('bright','ArrowRight');
bindBtn('bdown','ArrowDown');
bindBtn('brun','ShiftLeft','ShiftRight');

// ── JUMP BUTTON — guaranteed 1 jump per tap ──────────────────
(function(){
  const el=document.getElementById('bjump');
  function dn(e){
    e.preventDefault();
    jumpQueue++;          // one queued jump per tap
    jumpHoldTouch=true;   // finger is down = hold boost active
    keys.Space=true;
    el.classList.add('on');
    initAC();
  }
  function up(e){
    e.preventDefault();
    jumpHoldTouch=false;
    keys.Space=false;
    el.classList.remove('on');
  }
  el.addEventListener('touchstart',dn,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('touchcancel',up,{passive:false});
  el.addEventListener('mousedown',dn);
  el.addEventListener('mouseup',up);
  el.addEventListener('mouseleave',up);
})();
// Start button
document.getElementById('bstart').addEventListener('click',()=>{just.Enter=true;initAC();});
document.getElementById('bstart').addEventListener('touchstart',(e)=>{e.preventDefault();just.Enter=true;initAC();},{passive:false});
// Pause button
document.getElementById('bpause').addEventListener('click',()=>{just.KeyP=true;initAC();});
document.getElementById('bpause').addEventListener('touchstart',(e)=>{e.preventDefault();just.KeyP=true;initAC();},{passive:false});

// ── PARTICLES ───────────────────────────────────────────────
let PARTS=[],FCOIN=[],FITEM=[];
let BUMPS={};
let flagPoleTop=0;

function spawnBrickParts(x,y){for(let i=0;i<8;i++)PARTS.push({x:x+Math.random()*T,y:y+Math.random()*T,vx:(Math.random()-0.5)*8,vy:-Math.random()*10-2,life:35,col:'#C84B00',size:5});}
function spawnCoinPop(x,y){FCOIN.push({x,y,vy:-9,life:45,score:200});}
function spawnScorePop(x,y,sc){FCOIN.push({x,y,vy:-2,life:40,score:sc,text:true});}

// ── BLOCK HIT ───────────────────────────────────────────────
function hitBlock(lvl,c,r,big){
  const id=lvl.tiles[r][c],key=`${c},${r}`;
  if(id===QU||id===SO){
    const cont=lvl.qblocks[key]||'coin';
    if(id===QU)lvl.tiles[r][c]=US;
    if(cont==='coin'){score+=200;coins++;SFX.coin();spawnCoinPop(c*T,r*T-T);}
    else{SFX.powerup();FITEM.push({type:cont,x:c*T,y:(r-1)*T,vx:1.5,vy:0,emerge:18,alive:true});}
  } else if(id===BR){
    if(big){lvl.tiles[r][c]=E;SFX.brk();spawnBrickParts(c*T,r*T);score+=50;}
    else{SFX.bump();BUMPS[key]={t:10,max:10};}
  }
}

// ── ENTITY ──────────────────────────────────────────────────
class Entity{
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;this.onGround=false;this.alive=true;}
  get left(){return this.x;}get right(){return this.x+this.w;}
  get top(){return this.y;}get bottom(){return this.y+this.h;}
  get cx(){return this.x+this.w/2;}get cy(){return this.y+this.h/2;}
  overlaps(o,m=4){return this.right>o.left+m&&this.left<o.right-m&&this.bottom>o.top+m&&this.top<o.bottom-m;}
  moveAndCollide(lvl){
    this.x+=this.vx;
    if(this.vx>0){const c=Math.floor((this.right-1)/T),r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);for(let r=r1;r<=r2;r++)if(isSolid(lvl.tiles[r]&&lvl.tiles[r][c]||0)){this.x=c*T-this.w;this.vx=0;break;}}
    else if(this.vx<0){const c=Math.floor(this.left/T),r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);for(let r=r1;r<=r2;r++)if(isSolid((lvl.tiles[r]||[])[c]||0)){this.x=(c+1)*T;this.vx=0;break;}}
    this.vy=Math.min(this.vy+GRAV,MAX_FALL);this.y+=this.vy;
    if(this.vy>0){
      const r=Math.floor((this.bottom-1)/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      let hit=false;
      for(let c=c1;c<=c2;c++)if(isSolid((lvl.tiles[r]||[])[c]||0)){this.y=r*T-this.h;this.vy=0;hit=true;break;}
      this.onGround=hit;
    } else if(this.vy<0){
      const r=Math.floor(this.top/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      for(let c=c1;c<=c2;c++){const id=(lvl.tiles[r]||[])[c]||0;
        if(isSolid(id)||isBlock(id)){this.y=(r+1)*T;this.vy=0;
          if(isBlock(id)||id===QU||id===US)hitBlock(lvl,c,r,this===mario?mario.big:false);break;}}
      this.onGround=false;
    } else {
      const r=Math.floor((this.bottom)/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      this.onGround=false;for(let c=c1;c<=c2;c++)if(isSolid((lvl.tiles[r]||[])[c]||0)){this.onGround=true;break;}
    }
  }
}

// ── MARIO ───────────────────────────────────────────────────
class Mario extends Entity{
  constructor(x,y){super(x,y,24,32);this.big=false;this.fire=false;this.inv=0;this.star=0;this.dead=false;this.deadT=0;this.walkF=0;this.walkT=0;this.dir=1;this.flag=false;this.flagT=0;this.won=false;this.jumpHeld=0;this.crouching=false;}
  get h(){return(this.big&&this.crouching)?24:this.big?48:32;}set h(v){}
  update(lvl){
    if(this.dead){this.deadT++;if(this.deadT===20)this.vy=-14;this.vy+=0.5;this.y+=this.vy;return;}
    if(this.flag){this._doFlag(lvl);return;}
    if(this.inv>0)this.inv--;if(this.star>0)this.star--;
    const run=keys.ShiftLeft||keys.ShiftRight,L=keys.ArrowLeft,R=keys.ArrowRight;
    const DOWN=keys.ArrowDown;
    // Crouch: big mario + down + on ground
    const wasCrouching=this.crouching;
    this.crouching=this.big&&DOWN&&this.onGround;
    // If uncrouching while big, shift y up so feet stay on ground
    if(wasCrouching&&!this.crouching&&this.big)this.y-=24;

    // ── JUMP ─────────────────────────────────────────────────
    // Keyboard: just.ArrowUp or just.Space fires once per press
    const kbJump=just.ArrowUp||just.Space;
    // Touch: consume one from queue when we land
    const touchJump=jumpQueue>0;
    const canJump=this.onGround&&!this.crouching;
    const J=(kbJump||touchJump)&&canJump;
    // Hold detection: keyboard = keys held, touch = finger still down
    const Jh=(keys.ArrowUp||keys.Space||jumpHoldTouch)&&this.vy<0&&!this.onGround;

    const spd=run?MRUN:MWALK;
    if(!this.crouching){
      if(L){this.vx=Math.max(this.vx-0.55,-spd);this.dir=-1;}
      else if(R){this.vx=Math.min(this.vx+0.55,spd);this.dir=1;}
      else this.vx*=this.onGround?0.78:0.9;
      if(Math.abs(this.vx)<0.2)this.vx=0;
    } else {
      // Crouching: slow down fast
      this.vx*=0.6;
      if(Math.abs(this.vx)<0.2)this.vx=0;
    }

    if(J){
      this.vy=run?-12.5:-10.5;
      this.jumpHeld=0;
      SFX.jump();
      this.onGround=false;
      if(touchJump)jumpQueue=Math.max(0,jumpQueue-1); // consume one tap
    }
    // Variable hold boost: extend jump while button held (capped at 22 frames)
    if(Jh){this.jumpHeld++;if(this.jumpHeld<22)this.vy-=0.27;}
    // Quick-release cut: let go early = lower arc
    const holdReleased=!keys.ArrowUp&&!keys.Space&&!jumpHoldTouch;
    if(holdReleased&&this.vy<-3&&!this.onGround)this.vy+=0.55;
    // Clear stale queued jumps if still airborne and queue piled up
    if(!this.onGround&&jumpQueue>1)jumpQueue=1;

    this.moveAndCollide(lvl);
    if(this.y>lvl.h*T+100)this.die();
    // Walk anim
    if(Math.abs(this.vx)>0.1&&this.onGround&&!this.crouching){
      this.walkT++;
      const rate=Math.max(2,9-Math.abs(this.vx)*1.6);
      if(this.walkT>rate){this.walkT=0;this.walkF=(this.walkF+1)%4;}
    }else if(this.onGround)this.walkF=0;
    this._pickCoins(lvl);this._pickItems();
    if(lvl.flagCol){const fx=lvl.flagCol*T;if(this.right>fx-4&&!this.flag){this.flag=true;this.flagT=0;stopMusic();SFX.flag();}}
    // Underground exit
    if(!lvl.flagCol&&this.x>(lvl.w-6)*T&&!this.flag){this.flag=true;this.flagT=0;stopMusic();SFX.flag();setTimeout(()=>nextLevel(),2000);}
  }
  _pickCoins(lvl){
    const c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T),r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);
    for(let c=c1;c<=c2;c++)for(let r=r1;r<=r2;r++)if((lvl.tiles[r]||[])[c]===CO){lvl.tiles[r][c]=E;score+=100;coins++;SFX.coin();spawnScorePop(c*T,r*T,'100');}
  }
  _pickItems(){
    for(const it of FITEM){if(!it.alive)continue;if(this.right>it.x+4&&this.left<it.x+28&&this.bottom>it.y+4&&this.top<it.y+28){this._applyItem(it.type);it.alive=false;}}
  }
  _applyItem(type){
    if(type==='mushroom'){if(!this.big){this.big=true;this.y-=16;SFX.powerup();}else{score+=1000;spawnScorePop(this.x,this.y,'1000');}}
    else if(type==='star'){this.star=480;SFX.powerup();}
    else if(type==='flower'){if(!this.big){this.big=true;this.y-=16;}this.fire=true;SFX.powerup();}
    else if(type==='1up'){lives++;SFX.oneup();spawnScorePop(this.x,this.y,'1UP');}
  }
  _doFlag(lvl){
    this.flagT++;
    if(!this.won){
      const flagX=lvl.flagCol?lvl.flagCol*T:this.x;
      const gndY=(lvl.h-2)*T;
      this.x=flagX-4;
      if(this.y+this.h<gndY)this.y+=4;
      else{this.won=true;score+=Math.ceil(timer)*50;setTimeout(()=>nextLevel(),2800);}
    }else{this.x+=2.5;this.dir=1;}
  }
  takeDamage(){
    if(this.inv>0||this.star>0)return;
    if(this.big){this.big=false;this.fire=false;if(this.y%T>8)this.y+=16;this.inv=120;SFX.bump();}
    else this.die();
  }
  die(){if(this.inv>0)return;this.dead=true;this.vy=-14;lives--;stopMusic();SFX.die();setTimeout(()=>{if(lives<=0){STATE='gameover';}else{initLevel(curLvl);STATE='playing';playLevelMusic();}},3000);}
}

// ── GOOMBA ──────────────────────────────────────────────────
class Goomba extends Entity{
  constructor(x,y){super(x,y,28,28);this.vx=-1.5;this.dead=false;this.deadT=0;this.wF=0;this.wT=0;}
  update(lvl){
    if(this.dead){this.deadT++;if(this.deadT>35)this.alive=false;return;}
    this.moveAndCollide(lvl);
    if(this.vx===0)this.vx=Math.random()<0.5?1.5:-1.5;
    if(this.onGround){const nc=this.vx>0?Math.floor((this.right+2)/T):Math.floor((this.left-2)/T),gr=Math.floor((this.bottom+1)/T);if(!isSolid((lvl.tiles[gr]||[])[nc]||0))this.vx=-this.vx;}
    if(this.x<0)this.vx=Math.abs(this.vx);
    this.wT++;if(this.wT>9){this.wT=0;this.wF=(this.wF+1)%2;}
    if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
      if(mario.star>0){this.alive=false;score+=200;spawnScorePop(this.x,this.y,'200');return;}
      if(mario.vy>1&&mario.bottom<this.cy+8){this.dead=true;mario.vy=-8;score+=100;SFX.stomp();spawnScorePop(this.cx,this.y,'100');}
      else mario.takeDamage();
    }
  }
  draw(cam){
    if(!this.alive)return;
    const x=Math.round(this.x-cam),y=Math.round(this.y),s=2;
    ctx.save();ctx.translate(x,y);
    if(this.dead){ctx.fillStyle='#8B4513';ctx.fillRect(2,this.h-10,24,10);ctx.fillStyle='#654321';ctx.fillRect(4,this.h-7,20,5);ctx.restore();return;}
    ctx.fillStyle='#8B4513';ctx.fillRect(2*s,0,10*s,2*s);ctx.fillRect(s,2*s,12*s,3*s);ctx.fillRect(0,5*s,14*s,4*s);ctx.fillRect(s,9*s,12*s,3*s);ctx.fillRect(2*s,12*s,10*s,2*s);
    ctx.fillStyle='#fff';ctx.fillRect(2*s,2*s,3*s,3*s);ctx.fillRect(9*s,2*s,3*s,3*s);
    ctx.fillStyle='#000';ctx.fillRect(3*s,3*s,s*2,s*2);ctx.fillRect(10*s,3*s,s*2,s*2);
    ctx.fillStyle='#000';ctx.fillRect(s,s,4*s,s);ctx.fillRect(9*s,s,4*s,s);
    ctx.fillStyle='#fff';ctx.fillRect(2*s,7*s,3*s,2*s);ctx.fillRect(9*s,7*s,3*s,2*s);
    ctx.fillStyle='#8B4513';ctx.fillRect(5*s,7*s,4*s,2*s);
    ctx.fillStyle='#654321';
    if(this.wF===0){ctx.fillRect(0,13*s,5*s,s*2);ctx.fillRect(9*s,13*s,5*s,s*2);}
    else{ctx.fillRect(0,12*s,5*s,s*3);ctx.fillRect(9*s,12*s,5*s,s*3);}
    ctx.restore();
  }
}

// ── KOOPA ───────────────────────────────────────────────────
class Koopa extends Entity{
  constructor(x,y){super(x,y,26,38);this.vx=-1.2;this.dead=false;this.shell=false;this.shellT=0;this.wF=0;this.wT=0;}
  update(lvl){
    if(!this.alive)return;
    if(this.shell){
      if(Math.abs(this.vx)<0.1){
        this.shellT++;if(this.shellT>360){this.shell=false;this.shellT=0;this.h=38;this.y-=14;this.vx=-1.2;}
        if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){this.vx=mario.cx<this.cx?7:-7;SFX.stomp();}
      } else {
        this.moveAndCollide(lvl);if(this.vx===0)this.vx=-this.vx;
        for(const e of enemies){if(e!==this&&e.alive&&!e.dead&&this.overlaps(e)){e.dead=true;score+=200;spawnScorePop(e.cx,e.y,'200');}}
        if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){if(mario.star>0){this.alive=false;return;}mario.takeDamage();}
      }
      return;
    }
    this.moveAndCollide(lvl);if(this.vx===0)this.vx=Math.random()<0.5?1.2:-1.2;
    if(this.onGround){const nc=this.vx>0?Math.floor((this.right+2)/T):Math.floor((this.left-2)/T),gr=Math.floor((this.bottom+1)/T);if(!isSolid((lvl.tiles[gr]||[])[nc]||0))this.vx=-this.vx;}
    this.wT++;if(this.wT>11){this.wT=0;this.wF=(this.wF+1)%2;}
    if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
      if(mario.star>0){this.alive=false;score+=300;spawnScorePop(this.cx,this.y,'300');return;}
      if(mario.vy>1&&mario.bottom<this.cy+10){this.shell=true;this.h=26;this.y+=12;this.vx=0;mario.vy=-8;score+=100;SFX.stomp();}
      else mario.takeDamage();
    }
  }
  draw(cam){
    if(!this.alive)return;
    const px=Math.round(this.x-cam),py=Math.round(this.y),s=2;
    ctx.save();ctx.translate(px,py);
    if(this.shell){ctx.fillStyle='#00aa00';ctx.fillRect(0,0,26,26);ctx.fillStyle='#006600';ctx.fillRect(3,3,20,20);ctx.fillStyle='#44dd44';ctx.fillRect(5,3,4,20);ctx.fillStyle='#FFD700';ctx.fillRect(12,5,2,16);ctx.fillRect(6,12,14,2);ctx.restore();return;}
    const flip=this.vx>0;if(flip){ctx.translate(26,0);ctx.scale(-1,1);}
    ctx.fillStyle='#00aa00';ctx.fillRect(s,5*s,11*s,10*s);ctx.fillStyle='#006600';ctx.fillRect(2*s,6*s,9*s,8*s);
    ctx.fillStyle='#FFD700';ctx.fillRect(5*s,6*s,s,6*s);ctx.fillRect(3*s,9*s,7*s,s);
    ctx.fillStyle='#00cc44';ctx.fillRect(3*s,0,8*s,5*s);ctx.fillRect(6*s,5*s,5*s,3*s);
    ctx.fillStyle='#fff';ctx.fillRect(4*s,s,2*s,2*s);ctx.fillStyle='#000';ctx.fillRect(4*s+s,s,s,s);
    ctx.fillStyle='#00cc44';ctx.fillRect(0,6*s,2*s,3*s);
    ctx.fillStyle='#00cc44';
    const ly=15*s;
    if(this.wF===0){ctx.fillRect(2*s,ly,3*s,3*s);ctx.fillRect(7*s,ly,3*s,3*s);}else{ctx.fillRect(s,ly,3*s,3*s);ctx.fillRect(8*s,ly,3*s,3*s);}
    ctx.fillStyle='#cc4400';
    if(this.wF===0){ctx.fillRect(2*s,ly+3*s,3*s,s);ctx.fillRect(7*s,ly+3*s,3*s,s);}else{ctx.fillRect(s,ly+3*s,3*s,s);ctx.fillRect(8*s,ly+3*s,3*s,s);}
    ctx.restore();
  }
}

// ── MARIO SPRITE ────────────────────────────────────────────
function px(s,c,r,w=1,h=1){ctx.fillRect(c*s,r*s,w*s,h*s);}
function drawMario(m,cam){
  if(!m.alive)return;
  const dx=Math.round(m.x-cam),dy=Math.round(m.y);
  if(m.inv>0&&Math.floor(m.inv/5)%2===0&&!m.dead)return;
  const s=2;
  ctx.save();ctx.translate(dx,dy);
  if(m.dir===-1){ctx.translate(24,0);ctx.scale(-1,1);}
  const C={r:m.star>0?`hsl(${Date.now()/10%360},100%,50%)`:'#e52929',sk:'#ffb97b',br:'#5c3100',bl:'#0000bc',bk:'#000'};
  const pose=m.dead?'dead':m.crouching?'crouch':m.onGround?(Math.abs(m.vx)>0.2?(m.vx*m.dir<0?'slide':'w'+m.walkF):'idle'):'jump';
  m.big?_bigMario(s,C,pose):_smallMario(s,C,pose);
  ctx.restore();
}
function _smallMario(s,C,pose){
  const{r,sk,br,bl,bk}=C;
  // Hat
  ctx.fillStyle=r;px(s,2,0,8);px(s,0,1,12,2);
  // Face + hair
  ctx.fillStyle=sk;px(s,2,3,8,2);px(s,1,4,10,1);
  ctx.fillStyle=br;px(s,9,3,3);
  // Mustache
  ctx.fillStyle=bk;px(s,1,5,3);px(s,7,5,3);
  ctx.fillStyle=br;px(s,0,6,4);px(s,5,6,6);

  if(pose==='jump'){
    // Body
    ctx.fillStyle=r;px(s,2,7,8,2);px(s,0,8,12);px(s,0,7,2);px(s,10,7,2);
    ctx.fillStyle=sk;px(s,0,8,1);px(s,11,8,1);
    ctx.fillStyle=bl;px(s,0,10,12);px(s,0,11,4);px(s,8,11,4);ctx.fillStyle=sk;px(s,4,10,4);
    // Jump legs: bent upward
    ctx.fillStyle=bl;px(s,0,12,4,2);px(s,8,12,4,2);
    ctx.fillStyle=br;px(s,0,13,5,3);px(s,7,13,5,3);
  } else {
    // Body
    ctx.fillStyle=r;px(s,2,7,8);px(s,1,8,10);px(s,0,9,12);
    ctx.fillStyle=bl;px(s,0,10,12);px(s,0,11,4);px(s,8,11,4);
    ctx.fillStyle=sk;px(s,4,10,4);

    // ── 4-frame walk legs ──────────────────────────────────
    // [leftPantC,leftPantR,leftPantW,leftPantH, rightPantC,rightPantR,rightPantW,rightPantH,
    //  leftShoeC,leftShoeR,leftShoeW,leftShoeH, rightShoeC,rightShoeR,rightShoeW,rightShoeH]
    const WF=pose==='idle'||pose==='slide'?0:
             pose==='w0'?0:pose==='w1'?1:pose==='w2'?2:pose==='w3'?3:0;
    const frames=[
      // 0 stand: symmetric
      [0,12,5,2, 7,12,5,2, 0,14,5,2, 7,14,5,2],
      // 1 left leg forward: left up+fwd, right back+down
      [-1,11,5,3, 8,12,4,2, -1,14,6,2, 8,14,4,2],
      // 2 mid crossing: both legs center
      [1,12,4,2, 7,12,4,2, 1,14,5,2, 6,14,5,2],
      // 3 right leg forward: right up+fwd, left back+down
      [0,12,4,2, 8,11,5,3, 0,14,4,2, 8,14,6,2],
    ];
    const[lc,lr,lw,lh, rc,rr,rw,rh, sc1,sr1,sw1,sh1, sc2,sr2,sw2,sh2]=frames[WF];
    ctx.fillStyle=bl;
    ctx.fillRect(lc*s,lr*s,lw*s,lh*s);
    ctx.fillRect(rc*s,rr*s,rw*s,rh*s);
    ctx.fillStyle=br;
    ctx.fillRect(sc1*s,sr1*s,sw1*s,sh1*s);
    ctx.fillRect(sc2*s,sr2*s,sw2*s,sh2*s);
  }
}
function _bigMario(s,C,pose){
  const{r,sk,br,bl,bk}=C;

  if(pose==='crouch'){
    // Crouching big mario — compressed, hat visible, legs bent
    ctx.fillStyle=r;px(s,2,0,8,2);px(s,0,2,12);   // hat
    ctx.fillStyle=sk;px(s,2,3,8,2);ctx.fillStyle=br;px(s,10,3,2); // face
    ctx.fillStyle=bk;px(s,1,5,2);px(s,8,5,2);ctx.fillStyle=br;px(s,0,6,4);px(s,5,6,5); // mustache
    ctx.fillStyle=r;px(s,1,7,10,2);px(s,0,9,12,2); // body squished
    ctx.fillStyle=bl;px(s,0,11,12,2);               // pants
    ctx.fillStyle=sk;px(s,5,11,2);
    // Bent legs
    ctx.fillStyle=bl;px(s,0,13,5,2);px(s,7,13,5,2);
    ctx.fillStyle=br;px(s,0,11,2,4);px(s,10,11,2,4); // shoe sides
    ctx.fillStyle=br;px(s,0,14,5,2);px(s,7,14,5,2);  // shoes flat
    return;
  }
  ctx.fillStyle=r;px(s,2,0,8,2);px(s,0,2,12);
  ctx.fillStyle=sk;px(s,1,3,10,2);px(s,2,5,8,2);ctx.fillStyle=br;px(s,10,3,2);
  ctx.fillStyle=bk;px(s,1,5,2);px(s,8,5,2);ctx.fillStyle=br;px(s,0,7,4);px(s,6,7,5);
  if(pose==='jump'){
    ctx.fillStyle=r;px(s,1,8,10,3);px(s,0,11,12,2);px(s,0,9,1);px(s,11,9,1);
    ctx.fillStyle=sk;px(s,0,10,1);px(s,11,10,1);
    ctx.fillStyle=bl;px(s,0,13,12,2);px(s,0,15,4);px(s,8,15,4);ctx.fillStyle=sk;px(s,5,13,2);
    ctx.fillStyle=bl;px(s,0,16,4,2);px(s,8,16,4,2);ctx.fillStyle=br;px(s,0,18,5,4);px(s,7,18,5,4);
  }else{
    ctx.fillStyle=r;px(s,1,8,10,3);px(s,0,11,12,2);
    ctx.fillStyle=bl;px(s,0,13,12,2);px(s,0,15,4);px(s,8,15,4);ctx.fillStyle=sk;px(s,5,13,2);
    const WF=pose==='idle'||pose==='slide'?0:pose==='w0'?0:pose==='w1'?1:pose==='w2'?2:pose==='w3'?3:0;
    const frames=[[0,16,5,2,7,16,5,2,0,18,5,4,7,18,5,4],[-1,15,5,3,8,16,4,2,-1,18,6,4,8,18,4,4],[1,16,4,2,7,16,4,2,1,18,5,4,6,18,5,4],[0,16,4,2,8,15,5,3,0,18,4,4,8,18,6,4]];
    const[lc,lr,lw,lh,rc,rr,rw,rh,sc1,sr1,sw1,sh1,sc2,sr2,sw2,sh2]=frames[WF];
    ctx.fillStyle=bl;ctx.fillRect(lc*s,lr*s,lw*s,lh*s);ctx.fillRect(rc*s,rr*s,rw*s,rh*s);
    ctx.fillStyle=br;ctx.fillRect(sc1*s,sr1*s,sw1*s,sh1*s);ctx.fillRect(sc2*s,sr2*s,sw2*s,sh2*s);
  }
}

// ── TILE DRAW ───────────────────────────────────────────────
function drawTile(id,sx,sy,c,r,bump=0){
  const x=sx,y=sy-bump;
  switch(id){
    case GR:
      ctx.fillStyle='#E7C584';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#58A846';ctx.fillRect(x,y,T,5);
      ctx.fillStyle='#C8A054';ctx.fillRect(x,y+5,T,2);
      ctx.fillStyle='#9C7030';ctx.fillRect(x,y+7,T,T-7);
      ctx.fillStyle='#B08040';ctx.fillRect(x+4,y+10,3,3);ctx.fillRect(x+18,y+18,4,3);ctx.fillRect(x+8,y+24,3,3);break;
    case BR:
      ctx.fillStyle='#CC4400';ctx.fillRect(x,y,T,T);ctx.fillStyle='#AA3300';
      ctx.fillRect(x,y+T/2-1,T,2);ctx.fillRect(x+T/2-1,y,2,T/2);
      ctx.fillRect(x+T/4-1,y+T/2,2,T/2);ctx.fillRect(x+3*T/4-1,y+T/2,2,T/2);
      ctx.fillStyle='#EE6622';ctx.fillRect(x+1,y+1,T-2,3);ctx.fillRect(x+1,y+1,3,T/2-2);break;
    case QU:{
      const qf=Math.floor(Date.now()/250)%4;
      ctx.fillStyle=qf<2?'#EFA000':'#D09000';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#7A4000';ctx.fillRect(x,y,T,3);ctx.fillRect(x,y+T-3,T,3);ctx.fillRect(x,y,3,T);ctx.fillRect(x+T-3,y,3,T);
      ctx.fillStyle='#DDDDDD';ctx.fillRect(x+3,y+3,T-6,T-6);
      ctx.fillStyle='#7A4000';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',x+T/2,y+T/2+1);break;}
    case US:
      ctx.fillStyle='#888840';ctx.fillRect(x,y,T,T);ctx.fillStyle='#666620';ctx.fillRect(x+3,y+3,T-6,T-6);
      ctx.fillStyle='#AAAAAA';ctx.fillRect(x,y,T,2);ctx.fillRect(x,y,2,T);break;
    case SO:
      ctx.fillStyle='#9898C8';ctx.fillRect(x,y,T,T);ctx.fillStyle='#7070A0';ctx.fillRect(x+2,y+2,T-4,T-4);
      ctx.fillStyle='#BBBBEE';ctx.fillRect(x,y,T,2);ctx.fillRect(x,y,2,T);
      ctx.fillStyle='#505080';ctx.fillRect(x+T-2,y,2,T);ctx.fillRect(x,y+T-2,T,2);break;
    case PTL:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);ctx.fillStyle='#007700';ctx.fillRect(x+3,y+3,T-6,T-3);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y+3,5,T-3);ctx.fillStyle='#00EE00';ctx.fillRect(x-3,y,T+3,9);
      ctx.fillStyle='#005500';ctx.fillRect(x,y+9,3,T-9);break;
    case PTR:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);ctx.fillStyle='#007700';ctx.fillRect(x+3,y+3,T-6,T-3);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y+3,5,T-3);ctx.fillStyle='#00EE00';ctx.fillRect(x,y,T+3,9);
      ctx.fillStyle='#005500';ctx.fillRect(x+T-3,y+9,3,T-9);break;
    case PBL:case PBR:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);ctx.fillStyle='#007700';ctx.fillRect(x+3,y,T-6,T);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y,5,T);
      if(id===PBL){ctx.fillStyle='#005500';ctx.fillRect(x,y,3,T);}else{ctx.fillStyle='#005500';ctx.fillRect(x+T-3,y,3,T);}break;
    case CO:{
      const cf=Math.floor(Date.now()/120)%4,radii=[8,5,3,5];
      ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+T/2,y+T/2,radii[cf],0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFF8AA';ctx.beginPath();ctx.arc(x+T/2-2,y+T/2-2,radii[cf]*0.4,0,Math.PI*2);ctx.fill();break;}
    case FL:
      ctx.fillStyle='#AAAAAA';ctx.fillRect(x+T/2-2,y,4,T);
      if(r===Math.floor(flagPoleTop/T)){ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+T/2,y+4,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#DD2222';ctx.fillRect(x+T/2+2,y+8,14,10);}
      break;
  }
}

// ── CLOUDS / HILLS ──────────────────────────────────────────
let clouds=[];
function makeClouds(W){
  clouds=[];for(let i=0;i<35;i++)clouds.push({x:Math.random()*W*T,y:18+Math.random()*90,sz:1+Math.floor(Math.random()*3)});
}
function drawClouds(cam){
  for(const c of clouds){
    const x=c.x-cam*0.25,s=c.sz*18;
    ctx.fillStyle='rgba(255,255,255,0.92)';ctx.beginPath();
    ctx.arc(x+s,c.y+s*0.5,s*0.55,0,Math.PI*2);ctx.arc(x+s*1.5,c.y+s*0.2,s*0.65,0,Math.PI*2);
    ctx.arc(x+s*2.2,c.y+s*0.5,s*0.5,0,Math.PI*2);ctx.arc(x+s*0.4,c.y+s*0.7,s*0.45,0,Math.PI*2);
    ctx.arc(x+s*2.6,c.y+s*0.7,s*0.4,0,Math.PI*2);ctx.fill();

// ── LEVEL BUILDERS ──────────────────────────────────────────
// H=12, T=32, ground at H-2=10 & H-1=11 (y=320 & 352)
// Blocks: H-5=7 (y=224), High: H-9=3 (y=96)
// Pipes: ph=2→row8, ph=3→row7, ph=4→row6
// Enemies: H-3=9 (y=288)
function ground(t,c1,c2,H){for(let c=c1;c<=c2;c++){t[H-2][c]=GR;t[H-1][c]=GR;}}
function pipe(t,col,ph,H){
  t[H-2-ph][col]=PTL;t[H-2-ph][col+1]=PTR;
  for(let r=H-2-ph+1;r<H-2;r++){t[r][col]=PBL;t[r][col+1]=PBR;}
}
function stairUp(t,sc,max,H){for(let i=0;i<max;i++)for(let j=0;j<=i;j++)t[H-2-j][sc+i]=SO;}
function stairDown(t,sc,max,H){for(let i=0;i<max;i++)for(let j=0;j<max-i;j++)t[H-2-j][sc+i]=SO;}
function castle(t,c1,c2,H){
  for(let c=c1;c<=c2;c++)for(let r=H-8;r<H-1;r++)t[r][c]=SO;
  for(let c=c1;c<=c2;c+=2)t[H-9][c]=SO;
  const mid=Math.floor((c1+c2)/2);
  for(let r=H-5;r<H-1;r++)t[r][mid]=E;
}

// ── GAME STATE ──────────────────────────────────────────────
let STATE='title',score=0,coins=0,lives=3,timer=400,timerTick=0;
let camX=0,mario=null,enemies=[],curLvl=0,curLevel=null;

function initLevel(idx){
  curLvl=idx;
  const fn=LEVELS[idx];
  curLevel=fn();
  mario=new Mario(3*T,(curLevel.h-4)*T);
  enemies=curLevel.enemies.map(e=>{const ex=e.c*T,ey=e.r*T;return e.type==='g'?new Goomba(ex,ey):new Koopa(ex,ey);});
  makeClouds(curLevel.w);
  PARTS=[];FCOIN=[];FITEM=[];BUMPS={};
  camX=0;timer=400;timerTick=0;
}
function nextLevel(){
  if(curLvl<LEVELS.length-1){curLvl++;initLevel(curLvl);STATE='playing';playLevelMusic();}
  else{STATE='win';stopMusic();}
}

// ── HUD ─────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,CW,38);
  ctx.font='bold 12px monospace';ctx.textAlign='left';
  ctx.fillStyle='#fff';ctx.fillText('MARIO',8,14);
  ctx.fillStyle=score>5000?'#FFD700':'#fff';ctx.fillText(String(score).padStart(6,'0'),8,30);
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(112,22,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.fillText(`×${String(coins).padStart(2,'0')}`,122,26);
  ctx.textAlign='center';ctx.fillStyle='#fff';
  ctx.fillText(curLevel?curLevel.name:'',CW/2,15);
  ctx.fillText(`♥×${lives}`,CW/2+95,28);
  ctx.textAlign='right';ctx.fillStyle='#fff';ctx.fillText('TIME',CW-8,14);
  ctx.fillStyle=timer<100?'#FF5555':'#fff';ctx.fillText(String(Math.ceil(timer)).padStart(3,'0'),CW-8,30);
}

// ── RENDER ──────────────────────────────────────────────────
function render(){
  const lvl=curLevel;
  if(lvl.underground){
    ctx.fillStyle='#000022';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='rgba(10,10,60,0.4)';for(let i=0;i<6;i++)ctx.fillRect(0,i*T*2+38,CW,T);
  } else {
    const sg=ctx.createLinearGradient(0,0,0,CH*0.75);
    sg.addColorStop(0,'#3268C8');sg.addColorStop(1,'#68B0F8');
    ctx.fillStyle=sg;ctx.fillRect(0,0,CW,CH);
    drawHills(camX);drawClouds(camX);
  }
  // Tiles
  const sc=Math.max(0,Math.floor(camX/T)-1),ec=Math.min(lvl.w,sc+22);
  for(let r=0;r<lvl.h;r++)for(let c=sc;c<ec;c++){
    const id=lvl.tiles[r][c];if(id===E)continue;
    const sx=c*T-camX,sy=r*T;
    const bk=`${c},${r}`;
    drawTile(id,sx,sy,c,r,BUMPS[bk]?Math.sin(BUMPS[bk].t/BUMPS[bk].max*Math.PI)*6:0);
  }
  // Items (mushrooms, stars etc)
  for(const it of FITEM){
    if(!it.alive)continue;
    const ix=it.x-camX,iy=it.y;
    if(it.type==='mushroom'){
      ctx.fillStyle='#CC2222';ctx.beginPath();ctx.arc(ix+16,iy+10,14,Math.PI,0);ctx.fill();
      ctx.fillRect(ix+2,iy+10,28,12);ctx.fillStyle='#fff';
      [6,14,22].forEach(dx=>{ctx.beginPath();ctx.arc(ix+dx,iy+10,4,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#FFB97B';ctx.fillRect(ix+8,iy+20,16,4);
    } else if(it.type==='star'){
      ctx.fillStyle=`hsl(${Date.now()/5%360},100%,60%)`;star5(ctx,ix+16,iy+16,14);
    } else if(it.type==='flower'){
      ctx.fillStyle='#FF6600';star5(ctx,ix+16,iy+12,10);ctx.fillStyle='#FFFF00';ctx.beginPath();ctx.arc(ix+16,iy+12,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#00BB00';ctx.fillRect(ix+14,iy+18,4,10);
    } else if(it.type==='1up'){
      ctx.fillStyle='#00BB00';ctx.fillRect(ix+4,iy+4,24,24);ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('1UP',ix+16,iy+20);
    }
  }
  // Enemies + Mario
  for(const e of enemies){if(e.x-camX>-60&&e.x-camX<CW+60)e.draw(camX);}
  if(mario)drawMario(mario,camX);
  // Particles
  for(const p of PARTS){ctx.fillStyle=p.col;ctx.fillRect(p.x-camX-p.size/2,p.y-p.size/2,p.size,p.size);}
  // Coin/score pops
  for(const c of FCOIN){
    if(c.text){ctx.fillStyle='#FFD700';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText(c.score,c.x-camX+16,c.y);}
    else{ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x-camX+8,c.y,8,0,Math.PI*2);ctx.fill();}
  }
  drawHUD();
}

function star5(ctx,cx,cy,r){
  ctx.beginPath();for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2,ri=i%2===0?r:r*0.45;i===0?ctx.moveTo(cx+Math.cos(a)*ri,cy+Math.sin(a)*ri):ctx.lineTo(cx+Math.cos(a)*ri,cy+Math.sin(a)*ri);}
  ctx.closePath();ctx.fill();
}

  ctx.fillStyle=gw;ctx.fillText('YOU WIN!',CW/2,CH/2-48);
  ctx.fillStyle='#fff';ctx.font='bold 20px monospace';ctx.fillText('🎉 PRINCESS PEACH IS SAVED! 🎉',CW/2,CH/2-6);
  ctx.fillText(`FINAL SCORE: ${String(score).padStart(6,'0')}`,CW/2,CH/2+34);
  ctx.font='16px monospace';ctx.fillText(`COINS: ${coins}  |  LIVES: ${lives}`,CW/2,CH/2+65);
  if(Math.floor(t2*1.5)%2){ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';ctx.fillText('PRESS START / ENTER TO PLAY AGAIN',CW/2,CH/2+108);}
}

// ── UPDATE ──────────────────────────────────────────────────
function update(){
  if(STATE==='title'){if(just.Enter||just.Space){STATE='playing';score=0;coins=0;lives=3;curLvl=0;initLevel(0);playLevelMusic();}return;}
  if(STATE==='gameover'){if(just.Enter){STATE='playing';score=0;coins=0;lives=3;initLevel(0);playLevelMusic();}return;}
  if(STATE==='win'){if(just.Enter)STATE='title';return;}
  // Pause toggle
  if((just.KeyP||just.Escape)&&(STATE==='playing'||STATE==='paused')){
    if(STATE==='playing'){STATE='paused';stopMusic();}
    else{STATE='playing';playLevelMusic();}
    return;
  }
  if(STATE==='paused')return;
  if(STATE!=='playing')return;
  const lvl=curLevel;
  timerTick++;if(timerTick>=60){timerTick=0;timer=Math.max(0,timer-1);if(timer<=0&&mario&&!mario.dead)mario.die();}
  if(mario)mario.update(lvl);
  const AD=CW+200;
  for(const e of enemies)if(Math.abs(e.x-camX)<AD)e.update(lvl);
  for(const it of FITEM){
    if(!it.alive)continue;
    if(it.emerge>0){it.y-=1.2;it.emerge--;continue;}
    it.vy=Math.min(it.vy+GRAV*0.5,MAX_FALL);it.x+=it.vx;it.y+=it.vy;
    const cr=Math.floor((it.y+28)/T),cc=Math.floor(it.x/T),cc2=Math.floor((it.x+28)/T);
    if(isSolid((lvl.tiles[cr]||[])[cc]||0)||isSolid((lvl.tiles[cr]||[])[cc2]||0)){it.y=cr*T-32;it.vy=0;}
    const wc=it.vx>0?Math.floor((it.x+30)/T):Math.floor(it.x/T);
    if(isSolid((lvl.tiles[Math.floor((it.y+14)/T)]||[])[wc]||0))it.vx=-it.vx;
    if(it.y>lvl.h*T)it.alive=false;
  }
  for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;if(p.life<=0)PARTS.splice(i,1);}
  for(let i=FCOIN.length-1;i>=0;i--){const c=FCOIN[i];c.y+=c.vy;c.vy+=0.35;c.life--;if(c.life<=0)FCOIN.splice(i,1);}
  for(const k in BUMPS){BUMPS[k].t--;if(BUMPS[k].t<=0)delete BUMPS[k];}
  enemies=enemies.filter(e=>e.alive||(e.dead&&e.deadT<40));
  FITEM=FITEM.filter(i=>i.alive);
  if(mario)camX=Math.max(0,Math.min(mario.x-CW/3,curLevel.w*T-CW));
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,CW,CH);
  // Blurred box
  ctx.fillStyle='rgba(30,30,80,0.92)';
  ctx.beginPath();
  const bx=CW/2-110,by=CH/2-70,bw=220,bh=140;
  ctx.roundRect?ctx.roundRect(bx,by,bw,bh,16):ctx.rect(bx,by,bw,bh);
  ctx.fill();
  ctx.strokeStyle='rgba(255,220,60,0.7)';ctx.lineWidth=2;ctx.stroke();
  // Text
  ctx.textAlign='center';
  ctx.fillStyle='#FFD700';ctx.font='bold 32px monospace';
  ctx.fillText('⏸ PAUSED',CW/2,CH/2-20);
  ctx.fillStyle='#ccc';ctx.font='13px monospace';
  ctx.fillText('Press ⏸ or P to resume',CW/2,CH/2+18);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px monospace';
  ctx.fillText(`SCORE: ${String(score).padStart(6,'0')}  ·  LIVES: ${lives}`,CW/2,CH/2+45);
}

// ── MAIN LOOP ───────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  update();
  switch(STATE){
    case 'title':drawTitle();break;
    case 'playing':render();break;
    case 'paused':render();drawPause();break;
    case 'gameover':if(curLevel)render();drawGameOver();break;
    case 'win':drawWin();break;
  }
  for(const k in just)delete just[k];
}
initLevel(0);
loop();
</script>
