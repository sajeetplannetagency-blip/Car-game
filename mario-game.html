<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Mario Bros 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;max-width:100vw;max-height:100vh}
#info{color:#888;font:11px monospace;margin-top:8px;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Arrow Keys: Move &nbsp;|&nbsp; Space / Z: Jump &nbsp;|&nbsp; Shift / X: Run &nbsp;|&nbsp; Enter: Start</div>
<script>
// ============================================================
//   SUPER MARIO BROS 2.0  –  Complete Canvas Game
// ============================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const T  = 32;          // tile size pixels
const VC = 16;          // visible columns
const VR = 15;          // visible rows
const CW = VC * T;      // 512
const CH = VR * T;      // 480
canvas.width  = CW;
canvas.height = CH;

// ──────────── PHYSICS ───────────────────────────────────────
const GRAV      = 0.55;
const MAX_FALL  = 13;
const JWALK     = -11;
const JRUN      = -13;
const MWALK     = 3.0;
const MRUN      = 5.5;

// ──────────── TILE IDs ──────────────────────────────────────
const E=0,GR=1,BR=2,QU=3,US=4,SO=5,PTL=6,PTR=7,PBL=8,PBR=9,CO=10,FL=11;
const SOLID_TILES=[GR,BR,QU,US,SO,PTL,PTR,PBL,PBR];
const BLOCK_TILES=[BR,QU];

function isSolid(t){ return SOLID_TILES.includes(t); }
function isBlock(t){ return BLOCK_TILES.includes(t); }

// ──────────── AUDIO ─────────────────────────────────────────
let AC=null;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}

function tone(freq,type,dur,vol=0.25,delay=0){
  if(!AC)return;
  const t=AC.currentTime+delay;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.02);
}
function noise(dur,vol=0.4){
  if(!AC)return;
  const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=AC.createBufferSource(),g=AC.createGain();
  s.buffer=buf;s.connect(g);g.connect(AC.destination);
  const t=AC.currentTime;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.start(t);
}

const SFX={
  jump:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(700,t+0.12);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);o.start(t);o.stop(t+0.18);},
  coin:()=>{tone(1047,'square',0.06,0.35,0);tone(1319,'square',0.15,0.35,0.07);},
  stomp:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(450,t);o.frequency.exponentialRampToValueAtTime(80,t+0.12);g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);o.start(t);o.stop(t+0.15);},
  bump:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(100,t+0.1);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);o.start(t);o.stop(t+0.12);},
  break:()=>{noise(0.1,0.5);tone(200,'sawtooth',0.08,0.3);},
  powerup:()=>{[659,784,988,1319].forEach((f,i)=>tone(f,'square',0.1,0.3,i*0.1));},
  die:()=>{tone(494,'square',0.15,0.4,0);tone(440,'square',0.15,0.4,0.15);tone(369,'square',0.15,0.4,0.3);tone(261,'square',0.5,0.4,0.45);},
  flagpole:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,'square',0.12,0.3,i*0.12));},
  oneup:()=>{[523,659,784,1047,1319].forEach((f,i)=>tone(f,'square',0.1,0.3,i*0.08));},
  fireball:()=>{if(!AC)return;const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(200,t+0.08);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.08);o.start(t);o.stop(t+0.1);},
};

// ── MUSIC ───────────────────────────────────────────────────
// Overworld theme notes [freq,beats] (0=rest)
const BPM=200;
const beat=60/BPM;
const OW=[
  [659.3,1],[0,.5],[659.3,1],[0,1.5],[659.3,1],[0,1.5],[523.3,1],[659.3,1],[0,.5],[784,2],[0,3.5],[392,2],[0,3.5],
  [523.3,1],[0,2.5],[392,1],[0,2.5],[329.6,2],[0,2.5],[440,1],[0,1.5],[493.9,1],[0,1.5],[466.2,.5],[440,1],[0,1.5],
  [392,1.5],[659.3,1.5],[784,1.5],[880,1],[0,1.5],[698.5,1],[784,1],[0,1.5],[659.3,2],[0,1.5],[523.3,1],[587.3,.5],[493.9,1],[0,2],
  [523.3,1],[0,2.5],[392,1],[0,2.5],[329.6,2],[0,2.5],[440,1],[0,1.5],[493.9,1],[0,1.5],[466.2,.5],[440,1],[0,1.5],
  [392,1.5],[659.3,1.5],[784,1.5],[880,1],[0,1.5],[698.5,1],[784,1],[0,1.5],[659.3,2],[0,1.5],[523.3,1],[587.3,.5],[493.9,1],[0,2],
  [784,1],[0,1.5],[740,1],[698.5,1],[0,1.5],[622.3,1],[0,1.5],[659.3,1],[0,1.5],[415.3,.5],[440,1],[523.3,1],[0,1.5],[440,1],[523.3,1],[587.3,1],[0,3],
  [784,1],[0,1.5],[740,1],[698.5,1],[0,1.5],[622.3,1],[0,1.5],[659.3,1],[0,1.5],[988,1],[0,1.5],[988,1],[988,1],[0,4],
  [523.3,1],[0,.5],[523.3,1],[0,1.5],[523.3,1],[0,1.5],[493.9,1],[523.3,1],[0,.5],[440,2],[0,3.5]
];
let musicOn=false,musicTO=null,mIdx=0;
function startMusic(){
  if(musicOn||!AC)return;
  musicOn=true;mIdx=0;
  function nextNote(){
    if(!musicOn)return;
    const [f,b]=OW[mIdx%OW.length];
    if(f>0)tone(f,'square',b*beat*0.85,0.12,0);
    // Bass note
    if(mIdx%4===0&&f>0)tone(f/2,'square',b*beat*0.8,0.08,0);
    mIdx++;
    musicTO=setTimeout(nextNote,b*beat*1000);
  }
  nextNote();
}
function stopMusic(){musicOn=false;if(musicTO)clearTimeout(musicTO);}

// Underground theme
const UG=[
  [220,.5],[0,.5],[246.9,.5],[0,.5],[261.6,.5],[0,.5],[293.7,.5],[0,.5],[329.6,.5],[0,.5],[349.2,.5],[0,.5],[392,.5],[0,.5],[440,.5],[0,.5],
  [493.9,.5],[0,.5],[523.3,1],[0,1],[493.9,.5],[0,.5],[466.2,.5],[0,.5],[440,1],[0,1],
  [415.3,.5],[0,.5],[392,.5],[0,.5],[349.2,.5],[0,.5],[329.6,.5],[0,.5],[293.7,.5],[0,.5],[261.6,.5],[0,.5],[246.9,.5],[0,.5],[220,1],[0,2],
];
function startUnderground(){
  if(musicOn||!AC)return;
  musicOn=true;mIdx=0;
  const theme=UG;
  function next(){
    if(!musicOn)return;
    const[f,b]=theme[mIdx%theme.length];
    if(f>0)tone(f,'square',b*beat*0.85,0.12,0);
    mIdx++;
    musicTO=setTimeout(next,b*beat*1000);
  }
  next();
}

// ──────────── INPUT ──────────────────────────────────────────
const keys={},just={};
window.addEventListener('keydown',e=>{
  if(!keys[e.code])just[e.code]=true;
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  initAC();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ──────────── TILE HELPERS ───────────────────────────────────
function getTile(lvl,c,r){
  if(r<0||r>=lvl.h||c<0||c>=lvl.w)return SO;
  return lvl.tiles[r][c];
}
function setTile(lvl,c,r,id){
  if(r<0||r>=lvl.h||c<0||c>=lvl.w)return;
  lvl.tiles[r][c]=id;
}

// ──────────── PARTICLE SYSTEM ────────────────────────────────
let PARTS=[],FCOIN=[],FITEM=[];

function spawnBrickParts(x,y){
  for(let i=0;i<8;i++){
    PARTS.push({x:x+Math.random()*T,y:y+Math.random()*T,
      vx:(Math.random()-0.5)*8,vy:-Math.random()*10-2,
      life:35,col:'#C84B00',size:5});
  }
}
function spawnCoinPop(x,y){
  FCOIN.push({x,y,vy:-9,life:45,score:200});
}
function spawnScorePop(x,y,sc){
  FCOIN.push({x,y,vy:-2,life:40,score:sc,text:true});
}

// ──────────── BLOCK HIT ─────────────────────────────────────
let BUMPS={};
function hitBlock(lvl,c,r,big){
  const id=getTile(lvl,c,r);
  const key=`${c},${r}`;
  if(id===QU||id===SO){
    const cont=lvl.qblocks[key]||'coin';
    if(id===QU)setTile(lvl,c,r,US);
    if(cont==='coin'){
      score+=200;coins++;SFX.coin();
      spawnCoinPop(c*T,r*T-T);
    } else {
      SFX.powerup();
      FITEM.push({type:cont,x:c*T,y:(r-1)*T,vx:1.5,vy:0,emerge:18,alive:true});
    }
  } else if(id===BR){
    if(big){
      setTile(lvl,c,r,E);SFX.break();
      spawnBrickParts(c*T,r*T);score+=50;
    } else {
      SFX.bump();BUMPS[key]={t:10,max:10};
    }
  }
}

// ──────────── BASE ENTITY ────────────────────────────────────
class Entity{
  constructor(x,y,w,h){
    this.x=x;this.y=y;this.w=w;this.h=h;
    this.vx=0;this.vy=0;this.onGround=false;this.alive=true;
  }
  get left(){return this.x;}
  get right(){return this.x+this.w;}
  get top(){return this.y;}
  get bottom(){return this.y+this.h;}
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}
  overlaps(o,m=4){
    return this.right>o.left+m&&this.left<o.right-m&&
           this.bottom>o.top+m&&this.top<o.bottom-m;
  }
  moveAndCollide(lvl){
    // X
    this.x+=this.vx;
    if(this.vx>0){
      const c=Math.floor((this.right-1)/T),r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);
      for(let r=r1;r<=r2;r++) if(isSolid(getTile(lvl,c,r))){this.x=c*T-this.w;this.vx=0;break;}
    } else if(this.vx<0){
      const c=Math.floor(this.left/T),r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);
      for(let r=r1;r<=r2;r++) if(isSolid(getTile(lvl,c,r))){this.x=(c+1)*T;this.vx=0;break;}
    }
    // Y
    this.vy=Math.min(this.vy+GRAV,MAX_FALL);
    this.y+=this.vy;
    if(this.vy>0){
      const r=Math.floor((this.bottom-1)/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      let hit=false;
      for(let c=c1;c<=c2;c++) if(isSolid(getTile(lvl,c,r))){this.y=r*T-this.h;this.vy=0;hit=true;break;}
      this.onGround=hit;
    } else if(this.vy<0){
      const r=Math.floor(this.top/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      for(let c=c1;c<=c2;c++){
        const id=getTile(lvl,c,r);
        if(isSolid(id)||isBlock(id)){
          this.y=(r+1)*T;this.vy=0;
          if(isBlock(id))hitBlock(lvl,c,r,this===mario?mario.big:false);
          break;
        }
      }
      this.onGround=false;
    } else {
      const r=Math.floor((this.bottom)/T),c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
      this.onGround=false;
      for(let c=c1;c<=c2;c++) if(isSolid(getTile(lvl,c,r))){this.onGround=true;break;}
    }
  }
}

// ──────────── MARIO ─────────────────────────────────────────
class Mario extends Entity{
  constructor(x,y){
    super(x,y,24,32);
    this.big=false;this.fire=false;
    this.inv=0;this.star=0;
    this.dead=false;this.deadT=0;
    this.walkF=0;this.walkT=0;
    this.dir=1;
    this.flag=false;this.flagT=0;
    this.won=false;
  }
  get h(){return this.big?48:32;}
  set h(v){}

  update(lvl){
    if(this.dead){
      this.deadT++;
      if(this.deadT===20)this.vy=-14;
      this.vy+=0.5;this.y+=this.vy;
      return;
    }
    if(this.flag){this._doFlag(lvl);return;}
    if(this.inv>0)this.inv--;
    if(this.star>0)this.star--;
    const run=keys.ShiftLeft||keys.ShiftRight||keys.KeyX;
    const L=keys.ArrowLeft||keys.KeyA;
    const R=keys.ArrowRight||keys.KeyD;
    const J=just.ArrowUp||just.Space||just.KeyZ||just.KeyW;
    const Jh=keys.ArrowUp||keys.Space||keys.KeyZ||keys.KeyW;
    const crouch=this.big&&(keys.ArrowDown||keys.KeyS)&&this.onGround;
    const spd=run?MRUN:MWALK;
    if(!crouch){
      if(L){this.vx=Math.max(this.vx-0.55,-spd);this.dir=-1;}
      else if(R){this.vx=Math.min(this.vx+0.55,spd);this.dir=1;}
      else this.vx*=this.onGround?0.78:0.9;
      if(Math.abs(this.vx)<0.2)this.vx=0;
    }
    if(J&&this.onGround){
      this.vy=run?JRUN:JWALK;SFX.jump();
      this.onGround=false;
    }
    if(!Jh&&this.vy<-4)this.vy+=0.35;
    // Crouch adjust
    if(crouch){this.w=24;}
    else{this.w=24;}
    this.moveAndCollide(lvl);
    if(this.y>lvl.h*T+100)this.die(lvl);
    // Walk anim
    if(Math.abs(this.vx)>0.1&&this.onGround){
      this.walkT++;
      if(this.walkT>Math.max(3,8-Math.abs(this.vx)*1.5)){this.walkT=0;this.walkF=(this.walkF+1)%3;}
    } else if(this.onGround)this.walkF=0;
    // Collect coins
    this._pickCoins(lvl);
    // Collect items
    this._pickItems();
    // Flag pole
    if(lvl.flagCol){
      const fx=lvl.flagCol*T;
      if(this.right>fx-4&&!this.flag){
        this.flag=true;this.flagT=0;
        stopMusic();SFX.flagpole();
        setTimeout(()=>SFX.coin(),500);
      }
    }
  }
  _pickCoins(lvl){
    const c1=Math.floor((this.left+2)/T),c2=Math.floor((this.right-3)/T);
    const r1=Math.floor((this.top+2)/T),r2=Math.floor((this.bottom-3)/T);
    for(let c=c1;c<=c2;c++)for(let r=r1;r<=r2;r++){
      if(getTile(lvl,c,r)===CO){setTile(lvl,c,r,E);score+=100;coins++;SFX.coin();
        spawnScorePop(c*T,r*T,'100');}
    }
  }
  _pickItems(){
    for(const it of FITEM){
      if(!it.alive)continue;
      if(this.right>it.x+4&&this.left<it.x+28&&this.bottom>it.y+4&&this.top<it.y+28){
        this._applyItem(it.type);it.alive=false;
      }
    }
  }
  _applyItem(type){
    if(type==='mushroom'){
      if(!this.big){this.big=true;this.y-=16;SFX.powerup();}
      else{score+=1000;spawnScorePop(this.x,this.y,'1000');}
    } else if(type==='star'){this.star=480;SFX.powerup();}
    else if(type==='flower'){
      if(!this.big){this.big=true;this.y-=16;}
      this.fire=true;SFX.powerup();
    } else if(type==='1up'){lives++;SFX.oneup();spawnScorePop(this.x,this.y,'1UP');}
  }
  _doFlag(lvl){
    this.flagT++;
    const flagX=lvl.flagCol*T;
    const gndY=(lvl.h-2)*T;
    // Slide on pole
    if(!this.won){
      this.x=flagX-4;
      if(this.y+this.h<gndY){this.y+=4;}
      else{
        this.won=true;
        score+=Math.ceil(timer)*50;
        setTimeout(()=>nextLevel(),2800);
      }
    } else {
      // Walk right after landing
      this.x+=2.5;this.dir=1;
    }
  }
  takeDamage(){
    if(this.inv>0||this.star>0)return;
    if(this.big){
      this.big=false;this.fire=false;
      if(this.y%T>8)this.y+=16;
      this.inv=120;SFX.bump();
    } else this.die();
  }
  die(){
    if(this.inv>0)return;
    this.dead=true;this.vy=-14;
    lives--;stopMusic();SFX.die();
    setTimeout(()=>{
      if(lives<=0){STATE='gameover';}
      else{initLevel(curLvl);STATE='playing';playLevelMusic();}
    },3000);
  }
}

// ──────────── GOOMBA ────────────────────────────────────────
class Goomba extends Entity{
  constructor(x,y){super(x,y,28,28);this.vx=-1.5;this.dead=false;this.deadT=0;this.wF=0;this.wT=0;}
  update(lvl){
    if(this.dead){this.deadT++;if(this.deadT>35)this.alive=false;return;}
    this.moveAndCollide(lvl);
    if(this.vx===0)this.vx=Math.random()<0.5?1.5:-1.5;
    // Turn at edge
    if(this.onGround){
      const nc=this.vx>0?Math.floor((this.right+2)/T):Math.floor((this.left-2)/T);
      const gr=Math.floor((this.bottom+1)/T);
      if(!isSolid(getTile(lvl,nc,gr)))this.vx=-this.vx;
    }
    if(this.x<0)this.vx=Math.abs(this.vx);
    // Walk anim
    this.wT++;if(this.wT>9){this.wT=0;this.wF=(this.wF+1)%2;}
    // Mario collision
    if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
      if(mario.star>0){this.alive=false;score+=200;spawnScorePop(this.x,this.y,'200');return;}
      if(mario.vy>1&&mario.bottom<this.cy+8){
        this.dead=true;mario.vy=-8;score+=100;SFX.stomp();spawnScorePop(this.cx,this.y,'100');
      } else mario.takeDamage();
    }
  }
  draw(cam){
    if(!this.alive)return;
    const x=Math.round(this.x-cam),y=Math.round(this.y);
    const s=2;
    ctx.save();ctx.translate(x,y);
    if(this.dead){
      ctx.fillStyle='#8B4513';ctx.fillRect(2,this.h-10,24,10);
      ctx.fillStyle='#654321';ctx.fillRect(4,this.h-7,20,5);
      ctx.restore();return;
    }
    // Body
    ctx.fillStyle='#8B4513';
    ctx.fillRect(2*s,0,10*s,2*s);ctx.fillRect(s,2*s,12*s,3*s);ctx.fillRect(0,5*s,14*s,4*s);
    ctx.fillRect(s,9*s,12*s,3*s);ctx.fillRect(2*s,12*s,10*s,2*s);
    // Eyes
    ctx.fillStyle='#fff';ctx.fillRect(2*s,2*s,3*s,3*s);ctx.fillRect(9*s,2*s,3*s,3*s);
    ctx.fillStyle='#000';ctx.fillRect(3*s,3*s,s*2,s*2);ctx.fillRect(10*s,3*s,s*2,s*2);
    // Eyebrows
    ctx.fillStyle='#000';ctx.fillRect(s,s,4*s,s);ctx.fillRect(9*s,s,4*s,s);
    // Mouth teeth
    ctx.fillStyle='#fff';ctx.fillRect(2*s,7*s,3*s,2*s);ctx.fillRect(9*s,7*s,3*s,2*s);
    ctx.fillStyle='#8B4513';ctx.fillRect(5*s,7*s,4*s,2*s);
    // Feet
    ctx.fillStyle='#654321';
    if(this.wF===0){ctx.fillRect(0,13*s,5*s,s*2);ctx.fillRect(9*s,13*s,5*s,s*2);}
    else{ctx.fillRect(0,12*s,5*s,s*3);ctx.fillRect(9*s,12*s,5*s,s*3);}
    ctx.restore();
  }
}

// ──────────── KOOPA ─────────────────────────────────────────
class Koopa extends Entity{
  constructor(x,y){super(x,y,26,38);this.vx=-1.2;this.dead=false;this.shell=false;this.shellT=0;this.wF=0;this.wT=0;}
  update(lvl){
    if(!this.alive)return;
    if(this.shell){
      if(Math.abs(this.vx)<0.1){
        this.shellT++;
        if(this.shellT>360){this.shell=false;this.shellT=0;this.h=38;this.y-=14;this.vx=-1.2;}
        if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
          // Kick shell
          this.vx=mario.cx<this.cx?7:-7;SFX.stomp();
        }
      } else {
        this.moveAndCollide(lvl);
        if(this.vx===0)this.vx=-this.vx;
        // Hit enemies
        for(const e of enemies){
          if(e!==this&&e.alive&&!e.dead&&this.overlaps(e)){
            e.dead?null:(e.dead=true);score+=200;spawnScorePop(e.cx,e.y,'200');
          }
        }
        if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
          if(mario.star>0){this.alive=false;return;}
          mario.takeDamage();
        }
      }
      return;
    }
    this.moveAndCollide(lvl);
    if(this.vx===0)this.vx=Math.random()<0.5?1.2:-1.2;
    if(this.onGround){
      const nc=this.vx>0?Math.floor((this.right+2)/T):Math.floor((this.left-2)/T);
      const gr=Math.floor((this.bottom+1)/T);
      if(!isSolid(getTile(lvl,nc,gr)))this.vx=-this.vx;
    }
    this.wT++;if(this.wT>11){this.wT=0;this.wF=(this.wF+1)%2;}
    if(mario&&!mario.dead&&!mario.flag&&this.overlaps(mario)){
      if(mario.star>0){this.alive=false;score+=300;spawnScorePop(this.cx,this.y,'300');return;}
      if(mario.vy>1&&mario.bottom<this.cy+10){
        this.shell=true;this.h=26;this.y+=12;this.vx=0;mario.vy=-8;score+=100;SFX.stomp();
      } else mario.takeDamage();
    }
  }
  draw(cam){
    if(!this.alive)return;
    const px=Math.round(this.x-cam),py=Math.round(this.y);
    const s=2;
    ctx.save();ctx.translate(px,py);
    if(this.shell){
      // Shell
      ctx.fillStyle='#00aa00';ctx.fillRect(0,0,26,26);
      ctx.fillStyle='#006600';ctx.fillRect(3,3,20,20);
      ctx.fillStyle='#44dd44';ctx.fillRect(5,3,4,20);
      ctx.fillStyle='#FFD700';
      ctx.fillRect(12,5,2,16);ctx.fillRect(6,12,14,2);
      ctx.restore();return;
    }
    const flip=this.vx>0;
    if(flip){ctx.translate(26,0);ctx.scale(-1,1);}
    // Shell back
    ctx.fillStyle='#00aa00';
    ctx.fillRect(s,5*s,11*s,10*s);
    ctx.fillStyle='#006600';
    ctx.fillRect(2*s,6*s,9*s,8*s);
    ctx.fillStyle='#FFD700';
    ctx.fillRect(5*s,6*s,s,6*s);ctx.fillRect(3*s,9*s,7*s,s);
    // Head
    ctx.fillStyle='#00cc44';
    ctx.fillRect(3*s,0,8*s,5*s);ctx.fillRect(6*s,5*s,5*s,3*s);
    // Eye
    ctx.fillStyle='#fff';ctx.fillRect(4*s,s,2*s,2*s);
    ctx.fillStyle='#000';ctx.fillRect(4*s+s,s,s,s);
    // Arm
    ctx.fillStyle='#00cc44';ctx.fillRect(0,6*s,2*s,3*s);
    // Legs
    ctx.fillStyle='#00cc44';
    const ly=15*s;
    if(this.wF===0){ctx.fillRect(2*s,ly,3*s,3*s);ctx.fillRect(7*s,ly,3*s,3*s);}
    else{ctx.fillRect(s,ly,3*s,3*s);ctx.fillRect(8*s,ly,3*s,3*s);}
    ctx.fillStyle='#cc4400';
    if(this.wF===0){ctx.fillRect(2*s,ly+3*s,3*s,s);ctx.fillRect(7*s,ly+3*s,3*s,s);}
    else{ctx.fillRect(s,ly+3*s,3*s,s);ctx.fillRect(8*s,ly+3*s,3*s,s);}
    ctx.restore();
  }
}

// ──────────── MARIO DRAW ────────────────────────────────────
function drawMario(m,cam){
  if(!m.alive)return;
  const px=Math.round(m.x-cam),py=Math.round(m.y);
  if(m.inv>0&&Math.floor(m.inv/5)%2===0&&!m.dead)return;
  const s=2;
  ctx.save();
  ctx.translate(px,py);
  const flip=m.dir===-1;
  if(flip){ctx.translate(24,0);ctx.scale(-1,1);}
  const C={
    r:m.star>0?`hsl(${Date.now()/10%360},100%,50%)`:'#e52929',
    sk:'#ffb97b',br:'#5c3100',bl:'#0000bc',
    w:'#fff',bk:'#000',
    lr:m.fire?'#fff':'#0000bc'
  };
  if(!m.big){
    _drawSmallMario(s,C,m.dead?'dead':m.onGround?
      (Math.abs(m.vx)>0.2?(m.vx*m.dir<0?'slide':'w'+m.walkF):'idle'):'jump');
  } else {
    _drawBigMario(s,C,m.dead?'dead':m.onGround?
      (Math.abs(m.vx)>0.2?(m.vx*m.dir<0?'slide':'w'+m.walkF):'idle'):'jump');
  }
  ctx.restore();
}

function px(s,c,r,w=1,h=1){ctx.fillRect(c*s,r*s,w*s,h*s);}

function _drawSmallMario(s,C,pose){

    ctx.fillStyle=bl;px(s,0,12,4);px(s,8,12,4);

}

// ──────────── TILE DRAW ─────────────────────────────────────
function drawTile(id,sx,sy,col,row,bump=0){
  const x=sx,y=sy-bump;
  switch(id){
    case GR:
      ctx.fillStyle='#E7C584';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#58A846';ctx.fillRect(x,y,T,5);
      ctx.fillStyle='#C8A054';ctx.fillRect(x,y+5,T,2);
      ctx.fillStyle='#9C7030';ctx.fillRect(x,y+7,T,T-7);
      // Dirt texture
      ctx.fillStyle='#B08040';
      ctx.fillRect(x+4,y+10,3,3);ctx.fillRect(x+18,y+18,4,3);ctx.fillRect(x+8,y+24,3,3);
      break;
    case BR:
      ctx.fillStyle='#CC4400';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#AA3300';
      ctx.fillRect(x,y+T/2-1,T,2);
      ctx.fillRect(x+T/2-1,y,2,T/2);
      ctx.fillRect(x+T/4-1,y+T/2,2,T/2);
      ctx.fillRect(x+3*T/4-1,y+T/2,2,T/2);
      ctx.fillStyle='#EE6622';
      ctx.fillRect(x+1,y+1,T-2,3);ctx.fillRect(x+1,y+1,3,T/2-2);
      break;
    case QU:{
      const qf=Math.floor(Date.now()/250)%4;
      ctx.fillStyle=qf<2?'#EFA000':'#D09000';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#7A4000';
      ctx.fillRect(x,y,T,3);ctx.fillRect(x,y+T-3,T,3);
      ctx.fillRect(x,y,3,T);ctx.fillRect(x+T-3,y,3,T);
      ctx.fillStyle='#DDDDDD';ctx.fillRect(x+3,y+3,T-6,T-6);
      ctx.fillStyle='#7A4000';
      ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',x+T/2,y+T/2+1);
      break;}
    case US:
      ctx.fillStyle='#888840';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#666620';ctx.fillRect(x+3,y+3,T-6,T-6);
      ctx.fillStyle='#AAAAAA';ctx.fillRect(x,y,T,2);ctx.fillRect(x,y,2,T);
      break;
    case SO:
      ctx.fillStyle='#9898C8';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#7070A0';ctx.fillRect(x+2,y+2,T-4,T-4);
      ctx.fillStyle='#BBBBEE';ctx.fillRect(x,y,T,2);ctx.fillRect(x,y,2,T);
      ctx.fillStyle='#505080';ctx.fillRect(x+T-2,y,2,T);ctx.fillRect(x,y+T-2,T,2);
      break;
    case PTL:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#007700';ctx.fillRect(x+3,y+3,T-6,T-3);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y+3,5,T-3);
      ctx.fillStyle='#00EE00';ctx.fillRect(x-3,y,T+3,9);
      ctx.fillStyle='#005500';ctx.fillRect(x,y+9,3,T-9);
      break;
    case PTR:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#007700';ctx.fillRect(x+3,y+3,T-6,T-3);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y+3,5,T-3);
      ctx.fillStyle='#00EE00';ctx.fillRect(x,y,T+3,9);
      ctx.fillStyle='#005500';ctx.fillRect(x+T-3,y+9,3,T-9);
      break;
    case PBL:case PBR:
      ctx.fillStyle='#00BB00';ctx.fillRect(x,y,T,T);
      ctx.fillStyle='#007700';ctx.fillRect(x+3,y,T-6,T);
      ctx.fillStyle='#44FF44';ctx.fillRect(x+3,y,5,T);
      if(id===PBL)ctx.fillStyle='#005500',ctx.fillRect(x,y,3,T);
      else ctx.fillStyle='#005500',ctx.fillRect(x+T-3,y,3,T);
      break;
    case CO:{
      const cf=Math.floor(Date.now()/120)%4;
      const radii=[8,5,3,5];
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.arc(x+T/2,y+T/2,radii[cf],0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFF8AA';
      ctx.beginPath();ctx.arc(x+T/2-2,y+T/2-2,radii[cf]*0.4,0,Math.PI*2);ctx.fill();
      break;}
    case FL:
      // Flagpole
      ctx.fillStyle='#AAAAAA';ctx.fillRect(x+T/2-2,y,4,T);
      // Flag color waves
      const fc=`hsl(${Date.now()/20%360},80%,50%)`;
      if(row===Math.floor(flagPoleTop/T)){
        ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x+T/2,y+4,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#DD2222';ctx.fillRect(x+T/2+2,y+8,14,10);
      }
      break;
  }
}
let flagPoleTop=0;

let clouds=[];
function makeClouds(lvlW){

      x:Math.random()*lvlW*T,

      sz:1+Math.floor(Math.random()*3)

function drawClouds(cam){

function drawHills(cam){
  ctx.fillStyle='#5EBB45';
  // Draw some decorative hills
  const hillX=[100,400,600,900,1200,1600,2000,2400,2800,3200,3600,4000,4400,4800,5200,5600,6000];
  for(const hx of hillX){

  }
}

// ──────────── LEVEL DATA ────────────────────────────────────
function row(w,...specs){
  const a=new Array(w).fill(E);
  for(const [c,n,id] of specs)for(let i=0;i<n;i++)a[c+i]=id;
  return a;
}
function ground(tiles,c1,c2,h){
  for(let c=c1;c<=c2;c++){tiles[h-2][c]=GR;tiles[h-1][c]=GR;}
}
function pipe(tiles,col,ph,h){
  tiles[h-2-ph][col]=PTL;tiles[h-2-ph][col+1]=PTR;
  for(let r=h-2-ph+1;r<h-2;r++){tiles[r][col]=PBL;tiles[r][col+1]=PBR;}
}
function stairUp(tiles,sc,max,h){
  for(let i=0;i<max;i++)for(let j=0;j<=i;j++)tiles[h-2-j][sc+i]=SO;
}
function stairDown(tiles,sc,max,h){
  for(let i=0;i<max;i++)for(let j=0;j<max-i;j++)tiles[h-2-j][sc+i]=SO;
}

function buildLvl1(){
  const W=214,H=15;

  t[9][16]=QU;t[9][20]=BR;t[9][21]=QU;t[9][22]=BR;t[9][23]=QU;t[9][24]=BR;
  t[9][60]=QU;t[9][63]=BR;t[9][64]=QU;
  t[5][20]=BR;t[5][21]=BR;t[5][22]=QU;t[5][23]=BR;t[5][24]=BR;
  t[9][96]=QU;t[9][105]=QU;t[9][109]=BR;t[9][110]=QU;t[9][111]=BR;
  t[5][105]=QU;t[5][106]=BR;t[5][107]=BR;t[5][108]=QU;
  // Coins
  for(let c=25;c<=30;c++)t[7][c]=CO;

  // Pipes
  pipe(t,30,2,H);pipe(t,41,3,H);pipe(t,52,4,H);pipe(t,64,4,H);
  pipe(t,97,4,H);
  // Staircase
  stairUp(t,175,8,H);stairDown(t,183,8,H);
  // Castle
  for(let c=196;c<=207;c++)for(let r=H-8;r<H-1;r++)t[r][c]=SO;
  [196,198,200,202,204,206].forEach(c=>t[H-9][c]=SO);
  for(let r=H-6;r<H-1;r++)t[r][201]=E; // door
  // Flagpole
  for(let r=H-10;r<H-2;r++)t[r][193]=FL;
  flagPoleTop=t[H-10][193]===FL?(H-10)*T:9*T;
  const en=[
    {type:'g',c:22,r:H-3},{type:'g',c:40,r:H-3},{type:'g',c:43,r:H-3},
    {type:'k',c:53,r:H-3},{type:'g',c:66,r:H-3},{type:'g',c:68,r:H-3},
    {type:'g',c:98,r:H-3},{type:'k',c:105,r:H-3},
    {type:'g',c:115,r:H-3},{type:'g',c:117,r:H-3},
    {type:'k',c:130,r:H-3},{type:'g',c:145,r:H-3},
    {type:'g',c:155,r:H-3},{type:'g',c:157,r:H-3},
    {type:'k',c:163,r:H-3},{type:'g',c:170,r:H-3},
  ];
  const qb={'16,9':'coin','21,9':'coin','23,9':'coin','22,5':'mushroom',
    '60,9':'coin','64,9':'coin','96,9':'star','105,9':'coin',
    '110,9':'coin','105,5':'mushroom','108,5':'coin'};
  return{tiles:t,w:W,h:H,enemies:en,qblocks:qb,flagCol:193,bg:'#5C94FC',name:'WORLD 1-1',underground:false};
}

function buildLvl2(){
  const W=200,H=15;
  const t=Array.from({length:H},()=>new Array(W).fill(E));
  ground(t,0,W-1,H);
  // Ceiling
  for(let c=0;c<W;c++){t[0][c]=SO;t[1][c]=SO;}
  // Pits in ground
  for(let c=50;c<=52;c++){t[H-2][c]=E;t[H-1][c]=E;}
  for(let c=88;c<=91;c++){t[H-2][c]=E;t[H-1][c]=E;}
  for(let c=115;c<=118;c++){t[H-2][c]=E;t[H-1][c]=E;}

const LEVELS=[buildLvl1(),buildLvl2(),buildLvl3()];

// ──────────── GAME STATE ────────────────────────────────────
let STATE='title';
let score=0,coins=0,lives=3;
let timer=400,timerTick=0;
let camX=0,camXsmooth=0;
let mario=null,enemies=[],curLvl=0;
let curLevel=null;

function playLevelMusic(){
  stopMusic();
  if(curLevel&&curLevel.underground)startUnderground();
  else startMusic();
}

function initLevel(idx){
  curLvl=idx;
  curLevel=JSON.parse(JSON.stringify(LEVELS[idx]));// deep copy to preserve original
  curLevel.qblocks=Object.assign({},LEVELS[idx].qblocks);
  // Fix tiles deep copy
  curLevel.tiles=LEVELS[idx].tiles.map(r=>[...r]);
  const h=curLevel.h,W=curLevel.w;
  mario=new Mario(3*T,(h-4)*T);
  enemies=curLevel.enemies.map(e=>{
    const ex=e.c*T,ey=e.r*T;
    return e.type==='g'?new Goomba(ex,ey):new Koopa(ex,ey);
  });
  makeClouds(W);
  PARTS=[];FCOIN=[];FITEM=[];BUMPS={};
  camX=0;camXsmooth=0;
  timer=400;timerTick=0;
}

function nextLevel(){
  if(curLvl<LEVELS.length-1){
    curLvl++;
    initLevel(curLvl);
    STATE='playing';
    playLevelMusic();
  } else {
    STATE='win';stopMusic();
  }
}

// ──────────── HUD ────────────────────────────────────────────
function drawHUD(){

// ──────────── RENDER ────────────────────────────────────────
function render(){
  const lvl=curLevel;
  // Sky
  if(lvl.underground){
    ctx.fillStyle='#000033';ctx.fillRect(0,0,CW,CH);
    // Underground bg pattern
    ctx.fillStyle='rgba(0,0,100,0.3)';
    for(let i=0;i<8;i++)ctx.fillRect(0,i*T*2,CW,T);
  } else {
    const sg=ctx.createLinearGradient(0,0,0,CH*0.7);
    sg.addColorStop(0,'#3268C8');sg.addColorStop(1,'#6CB8F8');
    ctx.fillStyle=sg;ctx.fillRect(0,0,CW,CH);
    drawHills(camX);
    drawClouds(camX);
  }
  // Tiles
  const sc=Math.max(0,Math.floor(camX/T)-1);
  const ec=Math.min(lvl.w,sc+VC+3);
  for(let r=0;r<lvl.h;r++){
    for(let c=sc;c<ec;c++){
      const id=lvl.tiles[r][c];
      if(id===E)continue;
      const sx=c*T-camX,sy=r*T;
      const bk=`${c},${r}`;
      const bump=BUMPS[bk]?Math.sin(BUMPS[bk].t/BUMPS[bk].max*Math.PI)*7:0;
      drawTile(id,sx,sy,c,r,bump);
    }
  }
  // Items
  for(const it of FITEM){
    if(!it.alive)continue;
    const ix=it.x-camX,iy=it.y;
    if(it.type==='mushroom'){
      ctx.fillStyle='#CC2222';
      ctx.beginPath();ctx.arc(ix+16,iy+10,14,Math.PI,0);ctx.fill();
      ctx.fillRect(ix+2,iy+10,28,12);
      ctx.fillStyle='#fff';
      [6,14,22].forEach(dx=>{ctx.beginPath();ctx.arc(ix+dx,iy+10,4,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#FFB97B';ctx.fillRect(ix+8,iy+20,16,4);
    } else if(it.type==='star'){
      ctx.fillStyle=`hsl(${Date.now()/5%360},100%,60%)`;
      star5(ctx,ix+16,iy+16,14);
    } else if(it.type==='flower'){
      ctx.fillStyle='#FF6600';star5(ctx,ix+16,iy+12,10);
      ctx.fillStyle='#FFFF00';ctx.beginPath();ctx.arc(ix+16,iy+12,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#00BB00';ctx.fillRect(ix+14,iy+18,4,10);
    } else if(it.type==='1up'){
      ctx.fillStyle='#00BB00';ctx.fillRect(ix+4,iy+4,24,24);
      ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';
      ctx.fillText('1UP',ix+16,iy+20);
    }
  }
  // Enemies
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.x-camX>-60&&e.x-camX<CW+60)e.draw(camX);
  }
  // Mario
  if(mario)drawMario(mario,camX);
  // Particles
  for(const p of PARTS){
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-camX-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  // Floating coins / score pops
  for(const c of FCOIN){
    if(c.text){
      ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';ctx.textAlign='center';
      ctx.fillText(c.score,c.x-camX+16,c.y);
    } else {
      ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x-camX+8,c.y,9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFEE44';ctx.beginPath();ctx.arc(c.x-camX+5,c.y-3,3,0,Math.PI*2);ctx.fill();
    }
  }
  drawHUD();
}

function star5(ctx,cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=i/10*Math.PI*2-Math.PI/2;
    const ri=i%2===0?r:r*0.45;
    i===0?ctx.moveTo(cx+Math.cos(a)*ri,cy+Math.sin(a)*ri):
          ctx.lineTo(cx+Math.cos(a)*ri,cy+Math.sin(a)*ri);
  }
  ctx.closePath();ctx.fill();
}

// ──────────── UPDATE ────────────────────────────────────────
function update(){
  const dt=1;
  if(STATE==='title'){
    if(just.Enter||just.Space){
      STATE='playing';score=0;coins=0;lives=3;curLvl=0;
      initLevel(0);playLevelMusic();
    }
    return;
  }
  if(STATE==='gameover'){
    if(just.Enter){
      STATE='playing';score=0;coins=0;lives=3;
      initLevel(0);playLevelMusic();
    }
    return;
  }
  if(STATE==='win'){
    if(just.Enter)STATE='title';
    return;
  }
  if(STATE!=='playing')return;
  const lvl=curLevel;
  // Timer countdown
  timerTick++;
  if(timerTick>=60){timerTick=0;timer=Math.max(0,timer-1);if(timer<=0&&mario&&!mario.dead)mario.die();}
  // Mario update
  if(mario)mario.update(lvl);
  // Enemies
  const activeDist=CW+200;
  for(const e of enemies){
    if(Math.abs(e.x-camX)<activeDist)e.update(lvl);
  }
  // Items
  for(const it of FITEM){
    if(!it.alive)continue;
    if(it.emerge>0){it.y-=1.2;it.emerge--;continue;}
    it.vy=Math.min(it.vy+GRAV*0.5,MAX_FALL);
    it.x+=it.vx;it.y+=it.vy;
    const cr=Math.floor((it.y+28)/T),cc=Math.floor(it.x/T),cc2=Math.floor((it.x+28)/T);
    if(isSolid(getTile(lvl,cc,cr))||isSolid(getTile(lvl,cc2,cr))){it.y=cr*T-32;it.vy=0;}
    const wcol=it.vx>0?Math.floor((it.x+30)/T):Math.floor(it.x/T);
    if(isSolid(getTile(lvl,wcol,Math.floor((it.y+14)/T))))it.vx=-it.vx;
    if(it.y>lvl.h*T)it.alive=false;
  }
  // Particles
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;
    if(p.life<=0)PARTS.splice(i,1);
  }
  // Floating coins
  for(let i=FCOIN.length-1;i>=0;i--){
    const c=FCOIN[i];c.y+=c.vy;c.vy+=0.35;c.life--;
    if(c.life<=0)FCOIN.splice(i,1);
  }
  // Bumps
  for(const k in BUMPS){BUMPS[k].t--;if(BUMPS[k].t<=0)delete BUMPS[k];}
  // Camera
  if(mario){
    const targetX=mario.x-CW/3;
    camX=Math.max(0,Math.min(targetX,lvl.w*T-CW));
  }
  // Cleanup
  enemies=enemies.filter(e=>e.alive||(e.dead&&e.deadT<40));
  FITEM=FITEM.filter(i=>i.alive);
}

// ──────────── MAIN LOOP ─────────────────────────────────────
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  update();
  switch(STATE){
    case 'title':drawTitle();break;
    case 'playing':render();break;
    case 'gameover':render();drawGameOver();break;
    case 'win':drawWin();break;
  }
  for(const k in just)delete just[k];
}

// Start!
initLevel(0);
requestAnimationFrame(loop);
</script>
